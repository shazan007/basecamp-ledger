<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" data-character="anmol">
  <defs>
    <!-- Full avatar clip -->
    <clipPath id="an-full">
      <rect width="1024" height="1024" rx="90" ry="90"/>
    </clipPath>
    <!-- Clip: right arm + phone region -->
    <clipPath id="an-phone">
      <rect x="578" y="420" width="410" height="470"/>
    </clipPath>
    <!-- Lens glare gradients -->
    <linearGradient id="an-glare-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="an-glare-r" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <style>
      /* === Phone arm gentle sway === */
      .an-phone {
        transform-origin: 620px 440px;
        animation: anPhoneSway 3.5s ease-in-out infinite;
      }
      @keyframes anPhoneSway {
        0%, 100% { transform: rotate(0deg)   translateY(0px); }
        30%       { transform: rotate(-5deg)  translateY(-10px); }
        65%       { transform: rotate(-3deg)  translateY(-6px); }
        82%       { transform: rotate(-6deg)  translateY(-12px); }
      }

      /* === Camera flash burst === */
      .an-flash {
        animation: anFlash 5s linear infinite;
      }
      @keyframes anFlash {
        0%, 78%, 100% { opacity: 0; }
        80%            { opacity: 0.85; }
        84%            { opacity: 0.3; }
        88%            { opacity: 0; }
      }

      /* === Phone screen glow === */
      .an-phone-screen {
        animation: anPhoneGlow 3.5s ease-in-out infinite;
        mix-blend-mode: screen;
      }
      @keyframes anPhoneGlow {
        0%, 100% { opacity: 0.1; }
        40%       { opacity: 0.4; }
      }

      /* === Sunglasses lens glare sweep === */
      .an-glare-l {
        animation: anGlareL 4s ease-in-out infinite;
      }
      .an-glare-r {
        animation: anGlareR 4s ease-in-out infinite;
        animation-delay: 0.3s;
      }
      @keyframes anGlareL {
        0%, 60%, 100% { opacity: 0; transform: translateX(-40px); }
        72%            { opacity: 0.7; transform: translateX(0px); }
        85%            { opacity: 0; transform: translateX(40px); }
      }
      @keyframes anGlareR {
        0%, 60%, 100% { opacity: 0; transform: translateX(-40px); }
        72%            { opacity: 0.7; transform: translateX(0px); }
        85%            { opacity: 0; transform: translateX(40px); }
      }

      /* === 4-point sparkle burst at camera === */
      .an-burst {
        transform-origin: 455px 758px;
        animation: anBurst 5s linear infinite;
      }
      @keyframes anBurst {
        0%, 76%, 100% { opacity: 0; transform: scale(0.2); }
        81%            { opacity: 1; transform: scale(1.3); }
        86%            { opacity: 0; transform: scale(0.5); }
      }
    </style>
  </defs>

  <!-- ── BASE LAYER ── -->
  <image href="anmol.png" x="0" y="0" width="1024" height="1024"
         clip-path="url(#an-full)" preserveAspectRatio="xMidYMid meet"/>

  <!-- ── ANIMATED: phone + arm sway ── -->
  <image href="anmol.png" x="0" y="0" width="1024" height="1024"
         clip-path="url(#an-phone)" class="an-phone"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- ── GLOW: phone screen ── -->
  <rect class="an-phone-screen" x="688" y="512" width="188" height="338"
        rx="14" fill="#60CFFF" clip-path="url(#an-full)"/>

  <!-- ── FLASH: camera shutter burst ── -->
  <rect class="an-flash" x="0" y="0" width="1024" height="1024"
        rx="90" fill="white" clip-path="url(#an-full)"/>

  <!-- ── BURST: 4-point star at camera lens ── -->
  <g class="an-burst" clip-path="url(#an-full)">
    <line x1="455" y1="718" x2="455" y2="798" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="415" y1="758" x2="495" y2="758" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="428" y1="730" x2="482" y2="786" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="482" y1="730" x2="428" y2="786" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- ── GLARE: left sunglass lens ── -->
  <ellipse class="an-glare-l" cx="370" cy="398" rx="48" ry="28"
           fill="url(#an-glare-l)" clip-path="url(#an-full)"/>

  <!-- ── GLARE: right sunglass lens ── -->
  <ellipse class="an-glare-r" cx="565" cy="392" rx="52" ry="28"
           fill="url(#an-glare-r)" clip-path="url(#an-full)"/>
</svg>